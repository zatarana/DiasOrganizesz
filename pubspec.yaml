name: diasorganize
description: DiasOrganize - Aplicativo focado em organização pessoal offline-first.
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  collection: ^1.18.0
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.4.9
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  path: ^1.9.0
  intl: ^0.20.2
  flutter_local_notifications: ^17.1.2
  shared_preferences: ^2.2.2
  fl_chart: ^0.66.0
  flutter_slidable: ^3.1.1
  table_calendar: ^3.1.2
  uuid: ^4.4.0
  timezone: ^0.9.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  sqflite_common_ffi: ^2.3.3

dependency_overrides:
  # Evita falha intermitente do sqlite3 3.x native assets no GitHub Actions
  # durante flutter build apk: hash inválido de libsqlite3.x64.android.so.
  sqlite3: 2.7.6

flutter:
  uses-material-design: true
