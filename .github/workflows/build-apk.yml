name: Build DiasOrganize APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  STABLE_APPLICATION_ID: com.example.diasorganize
  VERSION_CODE_OFFSET: 1000

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Normalizar estrutura Android do Flutter
        run: flutter create --platforms=android .

      - name: Habilitar desugaring Android
        run: dart run tool/patch_android_desugaring.dart

      - name: Aplicar melhorias UX da aba Finanças
        run: dart run tool/patch_finance_screen_ux.dart

      - name: Aplicar melhorias UX do formulário financeiro
        run: dart run tool/patch_transaction_form_ux.dart

      - name: Limpar avisos conhecidos do analyzer
        run: dart run tool/patch_analyze_cleanup.dart

      - name: Validar nova entrada de Finanças
        run: |
          echo "Validando dashboard da entrada de Finanças..."
          grep -q "class FinanceEntryScreen extends ConsumerWidget" lib/features/finance/finance_entry_screen.dart
          grep -q "_MonthHeroCard" lib/features/finance/finance_entry_screen.dart
          grep -q "_QuickActionsGrid" lib/features/finance/finance_entry_screen.dart
          grep -q "_AttentionCard" lib/features/finance/finance_entry_screen.dart
          grep -q "_UpcomingTransactionTile" lib/features/finance/finance_entry_screen.dart
          grep -q "Novo lançamento" lib/features/finance/finance_entry_screen.dart
          grep -q "Resumo de" lib/features/finance/finance_entry_screen.dart

          if grep -q "Escolha o que quer fazer agora" lib/features/finance/finance_entry_screen.dart; then
            echo "ERRO: entrada antiga de Finanças ainda está presente." >&2
            exit 1
          fi

      - name: Validar melhorias UX da aba Finanças
        run: |
          echo "Validando patch de UX da aba Finanças..."
          grep -q "NumberFormat.currency(locale: 'pt_BR'" lib/features/finance/finance_screen.dart
          grep -q "Dismissible(" lib/features/finance/finance_screen.dart
          grep -q "_buildFilterButton" lib/features/finance/finance_screen.dart
          grep -q "showModalBottomSheet" lib/features/finance/finance_screen.dart
          grep -q "PopupMenuButton<String>" lib/features/finance/finance_screen.dart

          if grep -q "Contas e metas')))," lib/features/finance/finance_screen.dart; then
            echo "ERRO: botões redundantes de navegação ainda aparecem no corpo da tela." >&2
            exit 1
          fi

          if grep -q "withOpacity" lib/features/finance/finance_screen.dart; then
            echo "ERRO: uso depreciado de withOpacity ainda aparece na aba Finanças." >&2
            exit 1
          fi

          if grep -q "_buildTypeFilters\|_buildStatusFilters\|_buildCategoryFilters\|_paidExpensesByCategory" lib/features/finance/finance_screen.dart; then
            echo "ERRO: funções antigas não utilizadas ainda aparecem na aba Finanças." >&2
            exit 1
          fi

      - name: Validar melhorias UX do formulário financeiro
        run: |
          echo "Validando organização do formulário financeiro..."
          grep -q "class _TransactionFormSection" lib/features/finance/create_transaction_screen.dart
          grep -q "Tipo e valor" lib/features/finance/create_transaction_screen.dart
          grep -q "Datas e status" lib/features/finance/create_transaction_screen.dart
          grep -q "Classificação" lib/features/finance/create_transaction_screen.dart
          grep -q "Opções avançadas" lib/features/finance/create_transaction_screen.dart
          grep -q "_parseMoney" lib/features/finance/create_transaction_screen.dart
          grep -q "_isSaving" lib/features/finance/create_transaction_screen.dart
          grep -q "ValueListenableBuilder<TextEditingValue>" lib/features/finance/create_transaction_screen.dart
          grep -q "InputChip(label: Text(tag)" lib/features/finance/create_transaction_screen.dart

          if grep -q "Icon(Icons.money_off" lib/features/finance/create_transaction_screen.dart; then
            echo "ERRO: ícone money_off antigo ainda aparece no formulário financeiro." >&2
            exit 1
          fi

      - name: Validar identidade e dados locais
        run: |
          echo "Validando applicationId estável: $STABLE_APPLICATION_ID"
          if ! grep -R "applicationId.*$STABLE_APPLICATION_ID" android/app/build.gradle*; then
            echo "ERRO: applicationId diferente do esperado. Isso faria o APK ser instalado como outro app ou impediria atualização." >&2
            exit 1
          fi

          echo "Validando nome do banco local..."
          if ! grep -R "diasorganize.db" lib/data/database/db_helper.dart; then
            echo "ERRO: nome do banco principal mudou. Isso pode fazer os dados parecerem perdidos após atualização." >&2
            exit 1
          fi

          echo "Verificando ausência de exclusão destrutiva do banco..."
          if grep -R "deleteDatabase\|databaseFactory.deleteDatabase" lib; then
            echo "ERRO: chamada destrutiva de banco detectada em lib/. Remova antes de gerar APK de atualização." >&2
            exit 1
          fi

      - name: Preparar versionamento automático do APK
        run: |
          BASE_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          BUILD_NUMBER=$((VERSION_CODE_OFFSET + GITHUB_RUN_NUMBER))
          echo "BUILD_NAME=$BASE_VERSION" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "APK_ARTIFACT_NAME=DiasOrganize-${BASE_VERSION}+${BUILD_NUMBER}-debug-apk" >> "$GITHUB_ENV"
          echo "Versão Android gerada: versionName=$BASE_VERSION / versionCode=$BUILD_NUMBER"

      - name: Instalar dependências
        run: flutter pub get

      - name: Analisar projeto
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Executar testes
        run: flutter test

      - name: Construir APK Debug com versionCode automático
        run: flutter build apk --debug --build-name "$BUILD_NAME" --build-number "$BUILD_NUMBER"

      - name: Registrar informações do APK
        run: |
          mkdir -p build/release-info
          cat > build/release-info/UPDATE_SAFETY.txt <<EOF
          DiasOrganize APK gerado pelo GitHub Actions

          applicationId esperado: $STABLE_APPLICATION_ID
          versionName: $BUILD_NAME
          versionCode: $BUILD_NUMBER
          assinatura: debug automática do workflow
          banco local esperado: diasorganize.db

          Para preservar dados ao atualizar:
          - instale este APK por cima do app atual;
          - não desinstale o app antigo;
          - mantenha o mesmo applicationId;
          - mantenha o mesmo nome/caminho do banco;
          - use apenas migrações não destrutivas.

          Observação importante:
          APK debug pode conflitar com outro APK já instalado se ele tiver sido assinado com uma chave diferente.
          Sem uma chave estável, o Android pode não permitir atualização por cima de instalações anteriores.
          EOF

      - name: Preparar artifact
        run: |
          mkdir -p build/apk-artifact
          cp build/app/outputs/flutter-apk/app-debug.apk "build/apk-artifact/${APK_ARTIFACT_NAME}.apk"
          cp build/release-info/UPDATE_SAFETY.txt "build/apk-artifact/UPDATE_SAFETY-${BUILD_NAME}+${BUILD_NUMBER}.txt"

      - name: Fazer upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_ARTIFACT_NAME }}
          path: build/apk-artifact/
