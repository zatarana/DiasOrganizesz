name: Build DiasOrganize APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  STABLE_APPLICATION_ID: com.example.diasorganize
  VERSION_CODE_OFFSET: 1000

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Normalizar estrutura Android do Flutter
        run: flutter create --platforms=android .

      - name: Habilitar desugaring Android
        run: dart run tool/patch_android_desugaring.dart

      - name: Validar identidade e dados locais
        run: |
          echo "Validando applicationId estável: $STABLE_APPLICATION_ID"
          if ! grep -R "applicationId.*$STABLE_APPLICATION_ID" android/app/build.gradle*; then
            echo "ERRO: applicationId diferente do esperado. Isso faria o APK ser instalado como outro app ou impediria atualização." >&2
            exit 1
          fi

          echo "Validando nome do banco local..."
          if ! grep -R "diasorganize.db" lib/data/database/db_helper.dart; then
            echo "ERRO: nome do banco principal mudou. Isso pode fazer os dados parecerem perdidos após atualização." >&2
            exit 1
          fi

          echo "Verificando ausência de exclusão destrutiva do banco..."
          if grep -R "deleteDatabase\|databaseFactory.deleteDatabase" lib; then
            echo "ERRO: chamada destrutiva de banco detectada em lib/. Remova antes de gerar APK de atualização." >&2
            exit 1
          fi

      - name: Preparar assinatura estável do APK
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ] || [ -z "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ] || [ -z "${{ secrets.ANDROID_KEY_ALIAS }}" ] || [ -z "${{ secrets.ANDROID_KEY_PASSWORD }}" ]; then
            echo "ERRO: os secrets de assinatura não estão configurados." >&2
            echo "Configure ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS e ANDROID_KEY_PASSWORD." >&2
            echo "Sem a mesma assinatura, o Android acusa conflito com o app já instalado." >&2
            exit 1
          fi

          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/diasorganize-upload-keystore.p12
          cat > android/key.properties <<EOF
          storeFile=diasorganize-upload-keystore.p12
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          storeType=pkcs12
          EOF
          dart run tool/patch_android_release_signing.dart

      - name: Preparar versionamento automático do APK
        run: |
          BASE_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          BUILD_NUMBER=$((VERSION_CODE_OFFSET + GITHUB_RUN_NUMBER))
          echo "BUILD_NAME=$BASE_VERSION" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "APK_ARTIFACT_NAME=DiasOrganize-${BASE_VERSION}+${BUILD_NUMBER}-signed-apk" >> "$GITHUB_ENV"
          echo "Versão Android gerada: versionName=$BASE_VERSION / versionCode=$BUILD_NUMBER"

      - name: Instalar dependências
        run: flutter pub get

      - name: Analisar projeto
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Executar testes
        run: flutter test

      - name: Construir APK assinado instalável como atualização
        run: flutter build apk --release --build-name "$BUILD_NAME" --build-number "$BUILD_NUMBER"

      - name: Registrar informações do APK
        run: |
          mkdir -p build/release-info
          cat > build/release-info/UPDATE_SAFETY.txt <<EOF
          DiasOrganize APK gerado pelo GitHub Actions

          applicationId esperado: $STABLE_APPLICATION_ID
          versionName: $BUILD_NAME
          versionCode: $BUILD_NUMBER
          assinatura: release estável via GitHub Secrets
          banco local esperado: diasorganize.db

          Para preservar dados ao atualizar:
          - instale este APK por cima do app atual;
          - não desinstale o app antigo;
          - mantenha o mesmo applicationId;
          - mantenha a mesma assinatura nos GitHub Secrets;
          - mantenha o mesmo nome/caminho do banco;
          - use apenas migrações não destrutivas.

          Se aparecer conflito de pacote, o APK instalado no aparelho foi assinado com outra chave.
          Nesse caso, exporte/backup os dados antes de desinstalar e reinstalar com esta assinatura estável.
          EOF

      - name: Preparar artifact
        run: |
          mkdir -p build/apk-artifact
          cp build/app/outputs/flutter-apk/app-release.apk "build/apk-artifact/${APK_ARTIFACT_NAME}.apk"
          cp build/release-info/UPDATE_SAFETY.txt "build/apk-artifact/UPDATE_SAFETY-${BUILD_NAME}+${BUILD_NUMBER}.txt"

      - name: Fazer upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_ARTIFACT_NAME }}
          path: build/apk-artifact/
