name: Build DiasOrganize APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  STABLE_APPLICATION_ID: com.example.diasorganize
  VERSION_CODE_OFFSET: 1000

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Normalizar estrutura Android do Flutter
        run: flutter create --platforms=android .

      - name: Habilitar desugaring Android
        run: dart run tool/patch_android_desugaring.dart

      - name: Aplicar patches financeiros e de tarefas
        run: |
          dart run tool/patch_finance_screen_ux.dart
          dart run tool/patch_finance_transactions_m2.dart
          dart run tool/patch_transaction_form_ux.dart
          dart run tool/patch_debts_m4.dart
          dart run tool/patch_finance_planning_money.dart
          dart run tool/patch_finance_entry_core.dart
          dart run tool/patch_finance_dashboard_charts_m4.dart
          dart run tool/patch_quick_transaction_m5.dart
          dart run tool/patch_finance_list_m6.dart
          dart run tool/patch_finance_dashboard_planning_m7.dart
          dart run tool/patch_today_tasks_ux.dart
          dart run tool/patch_today_tasks_m1.dart
          dart run tool/patch_analyze_cleanup.dart

      - name: Validar navegação financeira unificada
        run: |
          echo "Validando Drawer apontando para o hub financeiro..."
          grep -q "finance_entry_screen.dart" lib/features/dashboard/app_drawer.dart
          grep -q "FinanceEntryScreen" lib/features/dashboard/app_drawer.dart
          grep -q "Dashboard financeiro, transações, contas, metas e dívidas" lib/features/dashboard/app_drawer.dart

          if grep -q "finance_screen.dart" lib/features/dashboard/app_drawer.dart; then
            echo "ERRO: Drawer ainda importa FinanceScreen diretamente." >&2
            exit 1
          fi

          if grep -q "FinanceScreen()" lib/features/dashboard/app_drawer.dart; then
            echo "ERRO: Drawer ainda navega diretamente para a lista de transações." >&2
            exit 1
          fi

      - name: Validar dashboard financeiro atual
        run: |
          echo "Validando FinanceEntryScreen como dashboard financeiro..."
          grep -q "class FinanceEntryScreen extends ConsumerStatefulWidget" lib/features/finance/finance_entry_screen.dart
          grep -q "CustomScrollView" lib/features/finance/finance_entry_screen.dart
          grep -q "SliverAppBar" lib/features/finance/finance_entry_screen.dart
          grep -q "FlexibleSpaceBar" lib/features/finance/finance_entry_screen.dart
          grep -q "financeScreenDataProvider" lib/features/finance/finance_entry_screen.dart
          grep -q "realAccountBalanceProvider" lib/features/finance/finance_entry_screen.dart
          grep -q "Saldo consolidado" lib/features/finance/finance_entry_screen.dart
          grep -q "Atenção imediata" lib/features/finance/finance_entry_screen.dart
          grep -q "Transações recentes" lib/features/finance/finance_entry_screen.dart
          grep -q "Ferramentas financeiras" lib/features/finance/finance_entry_screen.dart

          if grep -q "ListView(" lib/features/finance/finance_entry_screen.dart; then
            echo "ERRO: FinanceEntryScreen voltou a usar ListView como estrutura principal." >&2
            exit 1
          fi

          if grep -q "FutureBuilder<double>\|_realBalanceFuture\|_loadRealBalance" lib/features/finance/finance_entry_screen.dart; then
            echo "ERRO: entrada financeira ainda usa carregamento local de saldo." >&2
            exit 1
          fi

      - name: Validar redesenho financeiro completo
        run: |
          dart run tool/verify_finance_attention_m3.dart
          dart run tool/verify_finance_dashboard_charts_m4.dart
          dart run tool/verify_quick_transaction_m5.dart
          dart run tool/verify_finance_list_m6.dart
          dart run tool/verify_finance_dashboard_planning_m7.dart
          dart run tool/verify_finance_hub_m8.dart
          dart run tool/verify_finance_redesign_all.dart

      - name: Validar moeda no planejamento
        run: |
          echo "Validando F-M1 no Planejamento Financeiro..."
          grep -q "MoneyFormatter.format(value)" lib/features/finance/finance_planning_screen.dart
          grep -q "MoneyFormatter.parse(" lib/features/finance/finance_planning_screen.dart
          grep -q "MoneyInputFormatter" lib/features/finance/finance_planning_screen.dart
          grep -q "formatForInput" lib/features/finance/finance_planning_screen.dart
          grep -q "class MoneyInputFormatter extends TextInputFormatter" lib/core/utils/money_formatter.dart

          if grep -q "String _money(num value) => 'R\\$" lib/features/finance/finance_planning_screen.dart; then
            echo "ERRO: _money antigo ainda aparece na tela de Planejamento." >&2
            exit 1
          fi

          if grep -q "replaceAll(',', '.')" lib/features/finance/finance_planning_screen.dart; then
            echo "ERRO: parsing antigo de moeda ainda aparece na tela de Planejamento." >&2
            exit 1
          fi

      - name: Validar dívidas
        run: |
          echo "Validando F-M4 no módulo de dívidas..."
          grep -q "Cadastrar dívida" lib/features/debts/debts_screen.dart
          grep -q "FloatingActionButton.extended" lib/features/debts/debts_screen.dart
          grep -q "Nova dívida" lib/features/debts/debts_screen.dart
          grep -q "_buildEmptyDebtState" lib/features/debts/debts_screen.dart
          grep -q "Nenhuma dívida cadastrada" lib/features/debts/debts_screen.dart
          grep -q "MoneyFormatter.format" lib/features/debts/debts_screen.dart
          grep -q "_buildDebtInfoCard" lib/features/debts/debt_details_screen.dart
          grep -q "Dados da dívida" lib/features/debts/debt_details_screen.dart
          grep -q "_buildEmptyInstallmentsState" lib/features/debts/debt_details_screen.dart
          grep -q "Nenhuma parcela criada" lib/features/debts/debt_details_screen.dart
          grep -q "MoneyFormatter.format" lib/features/debts/debt_details_screen.dart
          grep -q "MoneyFormatter.parse" lib/features/debts/debt_details_screen.dart

          if grep -q "String _money(num value) => 'R\\$" lib/features/debts/debt_details_screen.dart; then
            echo "ERRO: detalhes de dívida ainda usa _money antigo." >&2
            exit 1
          fi

          if grep -q "replaceAll(',', '.')" lib/features/debts/debt_details_screen.dart; then
            echo "ERRO: detalhes de dívida ainda usa parsing monetário antigo." >&2
            exit 1
          fi

      - name: Validar tarefas
        run: |
          echo "Validando T-M3 no Kanban..."
          grep -q "LongPressDraggable<Task>" lib/features/tasks/task_kanban_screen.dart
          grep -q "DragTarget<Task>" lib/features/tasks/task_kanban_screen.dart
          grep -q "onAccept:" lib/features/tasks/task_kanban_screen.dart
          grep -q "_moveTaskToColumn" lib/features/tasks/task_kanban_screen.dart
          grep -q "_KanbanQuickAdd" lib/features/tasks/task_kanban_screen.dart
          grep -q "Adicionar card rápido" lib/features/tasks/task_kanban_screen.dart
          grep -q "_taskForColumn" lib/features/tasks/task_kanban_screen.dart
          grep -q "_KanbanColumnType" lib/features/tasks/task_kanban_screen.dart

          if grep -q "targetStatus" lib/features/tasks/task_kanban_screen.dart; then
            echo "ERRO: Kanban antigo por targetStatus ainda aparece; drag real deve usar tipo de coluna." >&2
            exit 1
          fi

          echo "Validando T-M2 no formulário de tarefas..."
          grep -q "final _formKey = GlobalKey<FormState>()" lib/features/tasks/create_task_screen.dart
          grep -q "Form(" lib/features/tasks/create_task_screen.dart
          grep -q "TextFormField" lib/features/tasks/create_task_screen.dart
          grep -q "validator:" lib/features/tasks/create_task_screen.dart
          grep -q "_isSaving" lib/features/tasks/create_task_screen.dart
          grep -q "CircularProgressIndicator" lib/features/tasks/create_task_screen.dart
          grep -q "_TagsSelector" lib/features/tasks/create_task_screen.dart
          grep -q "InputChip" lib/features/tasks/create_task_screen.dart
          grep -q "_ReminderSelector" lib/features/tasks/create_task_screen.dart
          grep -q "_reminderOffsets" lib/features/tasks/create_task_screen.dart
          grep -q "take(3)" lib/features/tasks/create_task_screen.dart
          grep -q "cancelTaskReminderSet" lib/features/tasks/create_task_screen.dart
          grep -q "taskReminderOffsetId" lib/core/notifications/notification_service.dart
          grep -q "tags TEXT" lib/data/database/db_helper.dart
          grep -q "reminderOffsets TEXT" lib/data/database/db_helper.dart
          grep -q "final String? tags" lib/data/models/task_model.dart
          grep -q "final String? reminderOffsets" lib/data/models/task_model.dart

          if grep -q "SnackBar(content: Text('Título é obrigatório" lib/features/tasks/create_task_screen.dart; then
            echo "ERRO: validação antiga por SnackBar ainda existe no formulário de tarefas." >&2
            exit 1
          fi

          echo "Validando tela Hoje..."
          grep -q "Sugestões para hoje" lib/features/tasks/today_tasks_screen.dart
          grep -q "_openSuggestionsSheet" lib/features/tasks/today_tasks_screen.dart
          grep -q "Icons.lightbulb_outline" lib/features/tasks/today_tasks_screen.dart
          grep -q "suggestionTasks" lib/features/tasks/today_tasks_screen.dart
          grep -q "QuickAddTaskButton" lib/features/tasks/today_tasks_screen.dart
          grep -q "TweenAnimationBuilder<double>" lib/features/tasks/today_tasks_screen.dart
          grep -q "Celebração do dia" lib/features/tasks/today_tasks_screen.dart
          grep -q "Dismissible(" lib/features/tasks/today_tasks_screen.dart
          grep -q "Adiar para amanhã" lib/features/tasks/today_tasks_screen.dart
          grep -q "label: 'Atrasada'" lib/features/tasks/today_tasks_screen.dart

          if grep -q "Criação completa para hoje" lib/features/tasks/today_tasks_screen.dart; then
            echo "ERRO: ação duplicada de criação completa ainda está na AppBar da tela Hoje." >&2
            exit 1
          fi

      - name: Validar identidade e dados locais
        run: |
          echo "Validando applicationId estável: $STABLE_APPLICATION_ID"
          if ! grep -R "applicationId.*$STABLE_APPLICATION_ID" android/app/build.gradle*; then
            echo "ERRO: applicationId diferente do esperado. Isso faria o APK ser instalado como outro app ou impediria atualização." >&2
            exit 1
          fi

          echo "Validando nome do banco local..."
          if ! grep -R "diasorganize.db" lib/data/database/db_helper.dart; then
            echo "ERRO: nome do banco principal mudou. Isso pode fazer os dados parecerem perdidos após atualização." >&2
            exit 1
          fi

          echo "Verificando ausência de exclusão destrutiva do banco..."
          if grep -R "deleteDatabase\|databaseFactory.deleteDatabase" lib; then
            echo "ERRO: chamada destrutiva de banco detectada em lib/. Remova antes de gerar APK de atualização." >&2
            exit 1
          fi

      - name: Preparar versionamento automático do APK
        run: |
          BASE_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          BUILD_NUMBER=$((VERSION_CODE_OFFSET + GITHUB_RUN_NUMBER))
          echo "BUILD_NAME=$BASE_VERSION" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "APK_ARTIFACT_NAME=DiasOrganize-${BASE_VERSION}+${BUILD_NUMBER}-debug-apk" >> "$GITHUB_ENV"
          echo "Versão Android gerada: versionName=$BASE_VERSION / versionCode=$BUILD_NUMBER"

      - name: Instalar dependências
        run: flutter pub get

      - name: Analisar projeto
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Executar testes
        run: flutter test

      - name: Construir APK Debug com versionCode automático
        run: flutter build apk --debug --build-name "$BUILD_NAME" --build-number "$BUILD_NUMBER"

      - name: Registrar informações do APK
        run: |
          mkdir -p build/release-info
          cat > build/release-info/UPDATE_SAFETY.txt <<EOF
          DiasOrganize APK gerado pelo GitHub Actions

          applicationId esperado: $STABLE_APPLICATION_ID
          versionName: $BUILD_NAME
          versionCode: $BUILD_NUMBER
          assinatura: debug automática do workflow
          banco local esperado: diasorganize.db

          Para preservar dados ao atualizar:
          - instale este APK por cima do app atual;
          - não desinstale o app antigo;
          - mantenha o mesmo applicationId;
          - mantenha o mesmo nome/caminho do banco;
          - use apenas migrações não destrutivas.

          Observação importante:
          APK debug pode conflitar com outro APK já instalado se ele tiver sido assinado com uma chave diferente.
          Sem uma chave estável, o Android pode não permitir atualização por cima de instalações anteriores.
          EOF

      - name: Preparar artifact
        run: |
          mkdir -p build/apk-artifact
          cp build/app/outputs/flutter-apk/app-debug.apk "build/apk-artifact/${APK_ARTIFACT_NAME}.apk"
          cp build/release-info/UPDATE_SAFETY.txt "build/apk-artifact/UPDATE_SAFETY-${BUILD_NAME}+${BUILD_NUMBER}.txt"

      - name: Fazer upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_ARTIFACT_NAME }}
          path: build/apk-artifact/
