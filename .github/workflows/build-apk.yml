name: Build DiasOrganize APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Normalizar estrutura Android do Flutter
        run: flutter create --platforms=android .

      - name: Habilitar desugaring Android
        run: |
          python3 <<'PY'
          from pathlib import Path

          groovy = Path('android/app/build.gradle')
          kotlin = Path('android/app/build.gradle.kts')

          if groovy.exists():
              text = groovy.read_text()
              if 'coreLibraryDesugaringEnabled' not in text:
                  text = text.replace(
                      'android {',
                      '''android {
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }
''',
                      1,
                  )
              if 'desugar_jdk_libs' not in text:
                  if 'dependencies {' in text:
                      text = text.replace(
                          'dependencies {',
                          '''dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'
''',
                          1,
                      )
                  else:
                      text += """

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'
}
"""
              groovy.write_text(text)

          elif kotlin.exists():
              text = kotlin.read_text()
              if 'isCoreLibraryDesugaringEnabled' not in text:
                  text = text.replace(
                      'android {',
                      '''android {
    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
        isCoreLibraryDesugaringEnabled = true
    }
''',
                      1,
                  )
              if 'desugar_jdk_libs' not in text:
                  if 'dependencies {' in text:
                      text = text.replace(
                          'dependencies {',
                          '''dependencies {
    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.5")
''',
                          1,
                      )
                  else:
                      text += """

dependencies {
    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.5")
}
"""
              kotlin.write_text(text)
          else:
              raise SystemExit('Nenhum arquivo Gradle Android encontrado em android/app')
          PY

      - name: Instalar dependências
        run: flutter pub get

      - name: Analisar projeto
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Executar testes
        run: flutter test

      - name: Construir APK (Debug)
        run: flutter build apk --debug

      - name: Fazer upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: DiasOrganize-v2-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
