name: Integrate finance UX patch once

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/integrate-finance-ux-once.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  integrate:
    name: Integrate patch_finance_screen_ux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Aplicar patch no código-fonte real
        run: dart run tool/patch_finance_screen_ux.dart

      - name: Remover patch do workflow e apagar script
        run: |
          python3 - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/build-apk.yml')
          text = workflow.read_text()
          text = text.replace('          dart run tool/patch_finance_screen_ux.dart\n', '')
          workflow.write_text(text)

          patch = Path('tool/patch_finance_screen_ux.dart')
          if patch.exists():
              patch.unlink()

          self_file = Path('.github/workflows/integrate-finance-ux-once.yml')
          if self_file.exists():
              self_file.unlink()
          PY

      - name: Validar integração local mínima
        run: |
          grep -q "NumberFormat.currency(locale: 'pt_BR'" lib/features/finance/finance_screen.dart
          grep -q "Future<double>? _realAccountBalanceFuture" lib/features/finance/finance_screen.dart
          grep -q "Widget _buildFilterButton" lib/features/finance/finance_screen.dart
          grep -q "Dismissible(" lib/features/finance/finance_screen.dart
          if grep -q "dart run tool/patch_finance_screen_ux.dart" .github/workflows/build-apk.yml; then
            echo "Patch ainda está no workflow principal." >&2
            exit 1
          fi
          if test -f tool/patch_finance_screen_ux.dart; then
            echo "Script de patch ainda existe." >&2
            exit 1
          fi

      - name: Commitar integração
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/features/finance/finance_screen.dart .github/workflows/build-apk.yml tool/patch_finance_screen_ux.dart .github/workflows/integrate-finance-ux-once.yml
          git commit -m "Integrate finance screen UX patch into source"
          git push
